name: Bug report
description: Report a reproducible Nipmod bug.
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Exact commands, package refs, URLs or API calls.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Nipmod version
      placeholder: "nipmod --version"
  - type: checkboxes
    id: safety
    attributes:
      label: Safety
      options:
        - label: This report does not contain secrets, private keys, tokens or active vulnerability details.
          required: true
