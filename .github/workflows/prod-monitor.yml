name: Production monitor

on:
  push:
    branches:
      - main
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-monitor
  cancel-in-progress: false

jobs:
  production-monitor:
    name: Production monitor
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NIPMOD_CANARY_API_KEY: ${{ secrets.NIPMOD_CANARY_API_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
      - run: corepack enable
      - run: corepack prepare pnpm@10.30.0 --activate
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm --dir nipmod build
      - name: API contract canary
        run: pnpm api:contract -- --base-url https://nipmod.com
      - name: Source resolver canary
        run: pnpm source:canary -- --base-url https://nipmod.com
      - name: Install plan canary
        run: pnpm install-plan:canary -- --base-url https://nipmod.com
      - name: Archive dry-run canary
        run: pnpm archive:canary -- --base-url https://nipmod.com
      - name: Rate limit health canary
        run: pnpm rate-limit:canary -- --base-url https://nipmod.com
      - name: Production excellence gate
        run: pnpm excellence:live -- --base-url https://nipmod.com
      - name: Production alert runner
        env:
          NIPMOD_ALERT_PRIMARY_WEBHOOK_BEARER_TOKEN: ${{ secrets.NIPMOD_ALERT_PRIMARY_WEBHOOK_BEARER_TOKEN }}
          NIPMOD_ALERT_PRIMARY_WEBHOOK_URL: ${{ secrets.NIPMOD_ALERT_PRIMARY_WEBHOOK_URL }}
          NIPMOD_ALERT_SECONDARY_WEBHOOK_BEARER_TOKEN: ${{ secrets.NIPMOD_ALERT_SECONDARY_WEBHOOK_BEARER_TOKEN }}
          NIPMOD_ALERT_SECONDARY_WEBHOOK_URL: ${{ secrets.NIPMOD_ALERT_SECONDARY_WEBHOOK_URL }}
          NIPMOD_ALERT_WEBHOOK_BEARER_TOKEN: ${{ secrets.NIPMOD_ALERT_WEBHOOK_BEARER_TOKEN }}
          NIPMOD_ALERT_WEBHOOK_URLS: ${{ secrets.NIPMOD_ALERT_WEBHOOK_URLS }}
        run: node --experimental-strip-types tools/prod-alert-runner.ts
      - name: Node edge resilience smoke
        run: node --experimental-strip-types tools/node-edge-resilience-smoke.ts
