name: API bug
description: Report a reproducible hosted API problem.
title: "[api] "
labels: ["bug", "api"]
body:
  - type: textarea
    id: request
    attributes:
      label: Request
      description: Exact URL, method and request body if relevant.
      render: shell
    validations:
      required: true
  - type: textarea
    id: response
    attributes:
      label: Response
      description: Status code, response body and headers that matter.
      render: json
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety
      options:
        - label: This report does not include API keys, private tokens or active vulnerability details.
          required: true
