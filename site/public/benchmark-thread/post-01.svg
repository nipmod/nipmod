<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Agent preflight benchmark</title>
  <desc id="desc">01 · Public benchmark</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#131514"/>
      <stop offset="0.55" stop-color="#22211f"/>
      <stop offset="1" stop-color="#101111"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#8fbf9a"/>
      <stop offset="1" stop-color="#d8b56d"/>
    </linearGradient>
    <linearGradient id="muted" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#6f746f"/>
      <stop offset="1" stop-color="#a8916d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.32"/>
    </filter>
    <style>
      .serif { font-family: Georgia, "Times New Roman", serif; }
      .sans { font-family: Inter, Arial, sans-serif; }
      .white { fill: #f5f1ea; }
      .mutedText { fill: #b9b2a8; opacity: 0.78; }
      .faintText { fill: #b9b2a8; opacity: 0.55; }
    </style>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect x="58" y="58" width="1484" height="884" rx="18" fill="rgba(255,255,255,0.018)" stroke="rgba(245,241,234,0.16)"/>

  <g transform="translate(96 86)">
    <rect x="0" y="0" width="44" height="44" rx="10" fill="#ef7c62"/>
    <text x="62" y="30" class="sans white" font-size="24" font-weight="750">Nipmod</text>
    <text x="0" y="104" class="sans faintText" font-size="16" font-weight="820">01 · PUBLIC BENCHMARK</text>
    <text x="0" y="170" class="serif white" font-size="64">Agent preflight benchmark</text>
    <text x="0" y="292" class="serif mutedText" font-size="25">What an agent knows before package, model, repository or MCP</text>
<text x="0" y="327" class="serif mutedText" font-size="25">execution.</text>
  </g>
  
    <g transform="translate(1130 126)">
      <circle cx="120" cy="120" r="116" fill="rgba(255,255,255,0.028)" stroke="rgba(245,241,234,0.16)"/>
      <text x="120" y="146" class="serif white" font-size="78" text-anchor="middle" font-weight="500">95/100</text>
    </g>
  

  <g transform="translate(96 380)" filter="url(#shadow)">
    <rect x="0" y="0" width="1408" height="440" rx="14" fill="rgba(255,255,255,0.034)" stroke="rgba(245,241,234,0.17)"/>
    
      <text x="54" y="100" class="white sans" font-size="24" font-weight="820">Live checks</text>
      <rect x="484" y="81" width="720" height="24" rx="12" fill="url(#gold)"/>
      <text x="1324" y="101" class="white sans" font-size="22" font-weight="850" text-anchor="end">7/7</text>
    

      <text x="54" y="172" class="mutedText sans" font-size="24" font-weight="720">Install-plan evidence</text>
      <rect x="484" y="153" width="720" height="24" rx="12" fill="url(#muted)"/>
      <text x="1324" y="173" class="mutedText sans" font-size="22" font-weight="850" text-anchor="end">7/7</text>
    

      <text x="54" y="244" class="mutedText sans" font-size="24" font-weight="720">Hosted workspace writes</text>
      <rect x="484" y="225" width="7" height="24" rx="12" fill="url(#muted)"/>
      <text x="1324" y="245" class="mutedText sans" font-size="22" font-weight="850" text-anchor="end">0</text>
    
    
    
  </g>

  <text x="96" y="884" class="sans faintText" font-size="15" font-weight="780">NIPMOD.COM/BENCHMARK · RAW JSON: NIPMOD.COM/BENCHMARK.JSON · 01/12</text>
