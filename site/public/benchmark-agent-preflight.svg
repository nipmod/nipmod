<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Nipmod agent preflight benchmark</title>
  <desc id="desc">A visual benchmark card showing Nipmod scoring 95 out of 100 across a read only agent preflight benchmark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#141615"/>
      <stop offset="0.52" stop-color="#20201f"/>
      <stop offset="1" stop-color="#111211"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#8fbf9a"/>
      <stop offset="1" stop-color="#d8b56d"/>
    </linearGradient>
    <linearGradient id="muted" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#6c716d"/>
      <stop offset="1" stop-color="#a8916d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <style>
      .serif { font-family: Georgia, "Times New Roman", serif; }
      .sans { font-family: Inter, Arial, sans-serif; }
      .mutedText { fill: #b9b2a8; opacity: 0.78; }
      .faintText { fill: #b9b2a8; opacity: 0.55; }
      .white { fill: #f5f1ea; }
      .line { stroke: rgba(245,241,234,0.16); stroke-width: 1; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect x="58" y="58" width="1484" height="884" rx="18" fill="rgba(255,255,255,0.018)" stroke="rgba(245,241,234,0.16)"/>

  <g transform="translate(96 86)">
    <rect x="0" y="0" width="44" height="44" rx="10" fill="#ef7c62" opacity="0.96"/>
    <text x="62" y="30" class="sans white" font-size="24" font-weight="750">Nipmod</text>
    <text x="0" y="108" class="serif white" font-size="66" font-weight="400">Agent preflight benchmark</text>
    <text x="0" y="158" class="serif mutedText" font-size="25">What an agent knows before package, model, repository or MCP execution.</text>
    <text x="0" y="194" class="sans faintText" font-size="15" font-weight="700">PUBLIC SNAPSHOT 2026 05 29 UTC · HOSTED API REMAINS READ ONLY · RAW JSON AT NIPMOD.COM/BENCHMARK.JSON</text>
  </g>

  <g transform="translate(96 320)" filter="url(#shadow)">
    <rect x="0" y="0" width="650" height="500" rx="14" fill="rgba(255,255,255,0.035)" stroke="rgba(245,241,234,0.17)"/>
    <text x="34" y="54" class="sans faintText" font-size="14" font-weight="800">COVERAGE ADJUSTED PREFLIGHT FIT</text>
    <text x="34" y="100" class="serif white" font-size="34">8 tracks. One narrow question.</text>

    <g transform="translate(34 142)">
      <line x1="250" x2="250" y1="0" y2="312" class="line"/>
      <line x1="390" x2="390" y1="0" y2="312" class="line"/>
      <line x1="530" x2="530" y1="0" y2="312" class="line"/>

      <text x="0" y="20" class="sans white" font-size="20" font-weight="780">Nipmod</text>
      <rect x="190" y="2" width="372" height="22" rx="11" fill="url(#gold)"/>
      <text x="584" y="21" class="sans white" font-size="22" font-weight="850">95</text>

      <text x="0" y="65" class="sans mutedText" font-size="18" font-weight="700">Native registries</text>
      <rect x="190" y="49" width="90" height="18" rx="9" fill="url(#muted)"/>
      <text x="584" y="66" class="sans mutedText" font-size="18" font-weight="800">23</text>

      <text x="0" y="106" class="sans mutedText" font-size="18" font-weight="700">deps.dev</text>
      <rect x="190" y="90" width="55" height="18" rx="9" fill="url(#muted)"/>
      <text x="584" y="107" class="sans mutedText" font-size="18" font-weight="800">14</text>

      <text x="0" y="147" class="sans mutedText" font-size="18" font-weight="700">Socket</text>
      <rect x="190" y="131" width="63" height="18" rx="9" fill="url(#muted)"/>
      <text x="584" y="148" class="sans mutedText" font-size="18" font-weight="800">16</text>

      <text x="0" y="188" class="sans mutedText" font-size="18" font-weight="700">OSV</text>
      <rect x="190" y="172" width="35" height="18" rx="9" fill="url(#muted)"/>
      <text x="584" y="189" class="sans mutedText" font-size="18" font-weight="800">9</text>

      <text x="0" y="229" class="sans mutedText" font-size="18" font-weight="700">Raw agent</text>
      <rect x="190" y="213" width="12" height="18" rx="9" fill="url(#muted)"/>
      <text x="584" y="230" class="sans mutedText" font-size="18" font-weight="800">3</text>

      <text x="0" y="270" class="sans mutedText" font-size="18" font-weight="700">OpenSSF Scorecard</text>
      <rect x="190" y="254" width="5" height="18" rx="9" fill="url(#muted)"/>
      <text x="584" y="271" class="sans mutedText" font-size="18" font-weight="800">1</text>

      <text x="0" y="311" class="sans mutedText" font-size="18" font-weight="700">Snyk API</text>
      <rect x="190" y="295" width="5" height="18" rx="9" fill="url(#muted)"/>
      <text x="584" y="312" class="sans mutedText" font-size="18" font-weight="800">1</text>
    </g>
  </g>

  <g transform="translate(790 320)" filter="url(#shadow)">
    <rect x="0" y="0" width="714" height="500" rx="14" fill="rgba(255,255,255,0.035)" stroke="rgba(245,241,234,0.17)"/>
    <text x="34" y="54" class="sans faintText" font-size="14" font-weight="800">CATEGORY SCORE</text>
    <text x="34" y="100" class="serif white" font-size="34">Where the result comes from</text>

    <g transform="translate(34 140)">
      <text x="0" y="23" class="sans white" font-size="21" font-weight="770">Source resolution</text>
      <text x="0" y="52" class="serif mutedText" font-size="18">Search, identity, version and metadata</text>
      <rect x="360" y="5" width="272" height="22" rx="11" fill="url(#gold)"/>
      <text x="646" y="24" class="sans white" font-size="21" font-weight="850">96</text>
      <text x="360" y="55" class="sans faintText" font-size="13" font-weight="750">best non Nipmod: 49</text>

      <text x="0" y="111" class="sans white" font-size="21" font-weight="770">Security evidence</text>
      <text x="0" y="140" class="serif mutedText" font-size="18">Advisories, provenance and behavior signals</text>
      <rect x="360" y="93" width="232" height="22" rx="11" fill="url(#gold)"/>
      <text x="646" y="112" class="sans white" font-size="21" font-weight="850">82</text>
      <text x="360" y="143" class="sans faintText" font-size="13" font-weight="750">best non Nipmod: 31</text>

      <text x="0" y="199" class="sans white" font-size="21" font-weight="770">Execution preflight</text>
      <text x="0" y="228" class="serif mutedText" font-size="18">Install plan and hosted read only boundary</text>
      <rect x="360" y="181" width="283" height="22" rx="11" fill="url(#gold)"/>
      <text x="646" y="200" class="sans white" font-size="21" font-weight="850">100</text>
      <text x="360" y="231" class="sans faintText" font-size="13" font-weight="750">best non Nipmod: 7</text>

      <text x="0" y="287" class="sans white" font-size="21" font-weight="770">Agent readiness</text>
      <text x="0" y="316" class="serif mutedText" font-size="18">Agent decision JSON</text>
      <rect x="360" y="269" width="283" height="22" rx="11" fill="url(#gold)"/>
      <text x="646" y="288" class="sans white" font-size="21" font-weight="850">100</text>
      <text x="360" y="319" class="sans faintText" font-size="13" font-weight="750">best non Nipmod: 10</text>
    </g>
  </g>

  <g transform="translate(96 846)">
    <text x="0" y="0" class="serif white" font-size="24">Public report: nipmod.com/benchmark</text>
    <text x="0" y="36" class="serif mutedText" font-size="20">8/8 live checks. 8/8 read only install plan evidence. Zero installs, clones, artifact unpacking, execution or workspace writes.</text>
    <text x="0" y="66" class="serif mutedText" font-size="20">Scoped product benchmark. A high score means stronger preflight evidence at this boundary, not a guarantee that a package is safe.</text>
  </g>
</svg>
