name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  nipmod-cli:
    name: CLI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
      - run: corepack enable
      - run: corepack prepare pnpm@10.30.0 --activate
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm --dir nipmod test
      - run: pnpm --dir nipmod typecheck
      - run: pnpm --dir nipmod build
      - run: pnpm --dir nipmod security:deps

  site:
    name: Site
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
      - run: corepack enable
      - run: corepack prepare pnpm@10.30.0 --activate
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm --dir site test
      - run: pnpm --dir site typecheck
      - run: pnpm --dir site build
      - run: pnpm --dir site security:deps
      - run: pnpm --dir site security:secrets

  release-surface:
    name: Release surface
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
      - run: corepack enable
      - run: corepack prepare pnpm@10.30.0 --activate
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm tools:test
      - run: pnpm public:check
      - run: pnpm supply-chain:check
